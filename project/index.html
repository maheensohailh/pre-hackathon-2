<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Login</title>
</head>
<body style="background-image: url(./image/bg.webp); background-repeat: no-repeat; background-size: cover;">

<div class="container mt-5">
  <div class="card p-4 col-md-5 mx-auto bg-dark text-white">
    <h2 class="text-center fw-bold">Login</h2>

    <input id="email" class="form-control my-2" placeholder="Email">
    <input id="pswd" type="password" class="form-control my-2" placeholder="Password">

    <button id="btn2" class="btn btn-primary w-100 mt-4">Login</button>

    <button id="google-btn" class="btn btn-danger w-100 mt-3">Google Login</button>

    <button id="forget-paswd" class="btn btn-link">Forgot Password?</button>

    <p class="mt-2">No account? <a href="./HTML/signup.html">Signup</a></p>
  </div>
</div>

<script type="module" src="./JS/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
