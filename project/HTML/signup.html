<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Signup</title>
</head>
<body style="background-image: url(../image/bg.webp); background-repeat: no-repeat; background-size: cover;">

<div class="container mt-5">
  <div class="card p-5 col-md-5 mx-auto bg-dark text-white fw-bold">
    <h3>Signup</h3>

    <form id="signup-form">
      <input id="name" class="form-control my-2" placeholder="Name">
      <input id="email" class="form-control my-2" placeholder="Email">
      <input id="pswd" type="password" class="form-control my-2" placeholder="Password">

      <button class="btn bg-danger-subtle fw-bold w-100">Signup</button>
    </form>
  </div>
</div>

<script type="module" src="../JS/signup.js"></script>

<!-- /////// bootstrap link -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
