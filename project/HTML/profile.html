<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Profile</title>
</head>
<body style="background-image: url(../image/bg.webp); background-repeat: no-repeat; background-size: cover;">

<div class="container mt-4">
  <h2 class="fw-bold">Welcome <span id="username"></span></h2>

  <!-- Toggle buttons -->
  <div class="my-4 d-flex justify-content-center gap-5 ">
    <button id="myTasksBtn" class="btn btn-primary fw-bold">My Tasks</button>
    <button id="allTasksBtn" class="btn btn-secondary fw-bold">All Tasks</button>
    <button id="logout-btn" class="btn btn-danger fw-bold">Logout</button>
  </div>

  <!-- Add/Edit Task -->
  <div class="card p-3 my-3 bg-dark" style="max-width: 600px; margin: auto;">
    <input id="taskTitle" class="form-control mb-2" placeholder="Task title">
    <textarea id="taskDesc" class="form-control mb-2" placeholder="Description"></textarea>
    <button  type="button" class="btn bg-danger-subtle fw-bold" id="addTaskBtn">Add Task</button>
    <button  type="button" class="btn btn-danger d-none fw-bold" id="updateTaskBtn">Update Task</button>
  </div>

  <ul id="taskList" class="list-group mb-4" style="max-width: 600px; margin: auto;"></ul>
</div>

<script type="module" src="../JS/profile.js"></script>
<script type="module" src="../JS/task.js"></script>

<!-- /////// bootstrap link -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
